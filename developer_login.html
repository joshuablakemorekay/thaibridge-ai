{% extends "base.html" %}

{% block title %}Developer Login{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 3rem auto; padding: 2rem;">
    <div class="card">
        <h1 style="text-align: center; color: var(--royal-purple);">🔐 Developer Login</h1>
        <p style="text-align: center; color: #666; margin-bottom: 2rem;">
            Enter the developer password to access admin features
        </p>
        
        <form method="POST" style="margin-top: 2rem;">
            <div style="margin: 1.5rem 0;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">
                    Password:
                </label>
                <input type="password" 
                       name="password" 
                       required 
                       placeholder="Enter developer password"
                       style="width: 100%; 
                              padding: 0.75rem; 
                              font-size: 1rem; 
                              border: 2px solid #ddd; 
                              border-radius: 8px;
                              box-sizing: border-box;">
            </div>
            
            <button type="submit" 
                    class="btn btn-saffron" 
                    style="width: 100%; padding: 1rem; font-size: 1.1rem; margin-top: 1rem;">
                🔓 Login
            </button>
        </form>
        
        {% if error %}
        <div style="background: #ffebee; 
                    border-left: 4px solid #f44336; 
                    padding: 1rem; 
                    margin-top: 1.5rem; 
                    border-radius: 4px;">
            <strong style="color: #c62828;">❌ Error:</strong>
            <span style="color: #d32f2f;">{{ error }}</span>
        </div>
        {% endif %}
        
        <div style="margin-top: 2rem; 
                    padding: 1rem; 
                    background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); 
                    border-radius: 8px; 
                    border-left: 4px solid var(--saffron);">
            <p style="margin: 0; font-size: 0.9rem; color: #666;">
                <strong>💡 Hint:</strong> Default password is <code style="background: white; padding: 0.2rem 0.5rem; border-radius: 4px;">buddha2025</code>
            </p>
        </div>
    </div>
    
    <div style="text-align: center; margin-top: 2rem;">
        <a href="/" class="btn" style="text-decoration: none;">
            ← Back to Home
        </a>
    </div>
</div>
{% endblock %}
